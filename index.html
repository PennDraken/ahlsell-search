<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ahlsell Sök</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="styles.css">
</head>

<h1>Ahlsell Sökfunktion</h1>
<p>
Via Vivaldi, exportera .csv fil med "Artikel per lagerplats"-data.<br>
Släpp .csv filen här...
</p>

<body>
    <section id="files" class="files">
    <h2>Tabell:</h2>
    <button id="resetButton">Rensa alla fält</button>
    <button id="copyButton">Exportera lista</button>
    <br><br>
    <table>
        <thead>
        <th scope="col">Hylla</th>
        <th scope="col">Artnr</th>
        <th scope="col">Beskrivning 1</th>
        <th scope="col">Beskrivning 2</th>
        </thead>
        <tbody>
        <td>
            <input id="shelfInput"></input>
        </td>
        <td>
            <input id="articleInput"></input>
        </td>
        <td colspan="2">
            <input id="descriptionInput" ></input>
        </td>
        </tbody>
        <tbody id="articleTable">
        </tbody>
    </table>
    <b>Sök</b><br>
    <input id="universalSearchInput"></input>
    </section>
    <script src="almedal.js"></script>
    <script src="molndal.js"></script>
    <script src="hisings_backa.js"></script>
    <script src="script.js"></script>
</body>
</html>
